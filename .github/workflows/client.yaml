name: CallBridge Web Client CI

# WHEN TO RUN:
# - On push to main or dev if client files changed
# - On any feature branch PR targeting dev or main
# - Manually from GitHub Actions tab
on:
  push:
    branches: [main, dev, feature/**]  # triggers on any branch with 'feature/' prefix
    paths:
      - 'client/**'              # triggers only when web dashboard files change
  pull_request:
    branches: [dev, main]        # enforces checks on PRs into BOTH protected branches
    paths:
      - 'client/**'
  workflow_dispatch:



jobs:
  build-and-test:
    name: Build & Test Web Client
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./client   # all steps run inside client/ by default

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install Dependencies
        run: npm ci

      # Validate commit message follows Jira format: CB-XX: Description
      - name: Validate Commit Message Format
        if: github.event_name == 'pull_request'
        run: |
          COMMIT_MSG=$(git log --format=%s -n 1 ${{ github.event.pull_request.head.sha }})
          echo "Commit message: $COMMIT_MSG"
          if ! echo "$COMMIT_MSG" | grep -qE '^CB-[0-9]+: .+'; then
            echo "   Commit message does not follow required format."
            echo "   Required: CB-XX: Description"
            echo "   Example:  CB-21: Build login page UI"
            exit 1
          fi
          echo " Commit message format is valid."

      # Checks code quality — won't fail if lint script isn't set up yet
      - name: Run Code Linting
        run: npm run lint --if-present

      # If no tests written yet add this to client/package.json:
      # "scripts": { "test": "echo 'No tests yet' && exit 0" }
      - name: Run Tests
        run: npm test --if-present

      # Full production build — catches TypeScript errors, missing imports, broken configs
      # React + Vite outputs to client/dist/
      - name: Build Production Bundle
        run: npm run build
        env:
          CI: true
          # Add when API URL is confirmed:
          # VITE_APPWRITE_ENDPOINT: ${{ secrets.VITE_APPWRITE_ENDPOINT }}
          # VITE_APPWRITE_PROJECT_ID: ${{ secrets.VITE_APPWRITE_PROJECT_ID }}