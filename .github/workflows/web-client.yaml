name: CallBridge Web Client CI

# WHEN TO RUN:
# - On push to main or dev if client files changed
# - On any feature branch PR targeting dev or main
# - Manually from GitHub Actions tab
on:
  push:
    branches: [main, dev, feature/**]  # triggers on any branch with 'feature/' prefix
    paths:
      - 'web-client/**'              # triggers only when web dashboard files change
  pull_request:
    branches: [dev, main]        # enforces checks on PRs into BOTH protected branches
    paths:
      - 'web-client/**'
  workflow_dispatch:



jobs:
  build-and-test:
    name: Build & Test Web Client
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: ./web-client   # all steps run inside web-client/ by default

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: web-client/package-lock.json

      - name: Install Dependencies
        run: npm ci

    
      # Checks code quality — won't fail if lint script isn't set up yet
      - name: Run Code Linting
        run: npm run lint --if-present

      # If no tests written yet add this to web-client/package.json:
      # "scripts": { "test": "echo 'No tests yet' && exit 0" }
      - name: Run Tests
        run: npm test --if-present

      # Full production build — catches TypeScript errors, missing imports, broken configs
      # React + Vite outputs to web-client/dist/
      - name: Build Production Bundle
        run: npm run build
        env:
          CI: true
          # Add when API URL is confirmed:
          # VITE_APPWRITE_ENDPOINT: ${{ secrets.VITE_APPWRITE_ENDPOINT }}
          # VITE_APPWRITE_PROJECT_ID: ${{ secrets.VITE_APPWRITE_PROJECT_ID }}
